<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Size Visualisation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Roboto:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Raleway:ital,wght@0,300;0,400;0,700;1,400&family=Nunito:ital,wght@0,300;0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:ital,wght@0,300;0,400;0,700;1,400&family=Outfit:wght@300;400;600;700&family=Spectral:ital,wght@0,300;0,400;0,700;1,400&family=Noto+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
/* ── Allianz Neo W04 ── */
@font-face{font-family:'AllianzNeo';src:url('AllianzNeoW04-Light.woff2') format('woff2');font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:'AllianzNeo';src:url('AllianzNeoW04-LightItalic.woff2') format('woff2');font-weight:300;font-style:italic;font-display:swap}
@font-face{font-family:'AllianzNeo';src:url('AllianzNeoW04-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'AllianzNeo';src:url('AllianzNeoW04-Italic.woff2') format('woff2');font-weight:400;font-style:italic;font-display:swap}
@font-face{font-family:'AllianzNeo';src:url('AllianzNeoW04-SemiBold.woff2') format('woff2');font-weight:600;font-style:normal;font-display:swap}
@font-face{font-family:'AllianzNeo';src:url('AllianzNeoW04-SemiBoldIt.woff2') format('woff2');font-weight:600;font-style:italic;font-display:swap}
@font-face{font-family:'AllianzNeo';src:url('AllianzNeoW04-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:'AllianzNeo';src:url('AllianzNeoW04-BoldItalic.woff2') format('woff2');font-weight:700;font-style:italic;font-display:swap}
@font-face{font-family:'AllianzNeoCondensed';src:url('AllianzNeoW04-CondLight.woff2') format('woff2');font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:'AllianzNeoCondensed';src:url('AllianzNeoW04-Condensed.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'AllianzNeoCondensed';src:url('AllianzNeoW04-CondensedBold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}

/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #ffffff;
  --bg2:       #f5f5f4;
  --bg3:       #eeede9;
  --text:      #1a1917;
  --text2:     #57534e;
  --text3:     #a8a29e;
  --border:    rgba(0,0,0,0.10);
  --border2:   rgba(0,0,0,0.18);
  --accent:    #003781;
  --accent-bg: #e8eef7;
  --accent-tx: #003781;
  --radius:    10px;
  --radius-sm: 6px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:        #1c1c1e;
    --bg2:       #2c2c2e;
    --bg3:       #3a3a3c;
    --text:      #f5f5f0;
    --text2:     #aeaaa4;
    --text3:     #6e6a64;
    --border:    rgba(255,255,255,0.10);
    --border2:   rgba(255,255,255,0.18);
    --accent:    #5b8fd4;
    --accent-bg: #1a2840;
    --accent-tx: #8ab4e8;
  }
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

/* ── Header ── */
.header {
  padding: 16px 20px 12px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.header-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
}

.theme-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 0.5px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: background .15s;
  flex-shrink: 0;
}
.theme-btn:hover { background: var(--bg3); }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: flex-end;
}

.ctrl-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.ctrl-group label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text3);
}

.sample-input {
  font-size: 14px;
  padding: 7px 10px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--bg2);
  color: var(--text);
  width: 100%;
  min-width: 0;
  outline: none;
  transition: border-color .15s;
}
.sample-input:focus { border-color: var(--accent); }

.weight-group { display: flex; gap: 6px; }
.weight-btn {
  font-size: 13px;
  padding: 7px 14px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: background .12s, color .12s;
  white-space: nowrap;
}
.weight-btn.on {
  background: var(--accent-bg);
  color: var(--accent-tx);
  border-color: var(--accent);
  font-weight: 600;
}

/* ── Tab bar (mobile only) ── */
.tab-bar {
  display: none;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
}

.tab-bar button {
  flex: 1;
  padding: 11px 6px;
  font-size: 13px;
  font-weight: 500;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text3);
  cursor: pointer;
  transition: color .12s, border-color .12s;
}

.tab-bar button.on {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* ── Main grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.col {
  display: flex;
  flex-direction: column;
  border-right: 0.5px solid var(--border);
}
.col:last-child { border-right: none; }

/* ── Column header ── */
.col-head {
  padding: 12px 16px;
  background: var(--bg2);
  border-bottom: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: sticky;
  top: 0;
  z-index: 10;
}

/* sticky offset — matches header height */
@media (min-width: 601px) {
  .col-head { top: var(--header-h, 110px); }
}

.col-head-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.col-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--text3);
}

.badge {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--accent-bg);
  color: var(--accent-tx);
  letter-spacing: .04em;
  white-space: nowrap;
}

.col-select {
  font-size: 13px;
  padding: 6px 8px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  width: 100%;
  outline: none;
}
.col-select:focus { border-color: var(--accent); }

/* ── Rows ── */
.rows { display: flex; flex-direction: column; }

.row {
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 0.5px solid var(--border);
  min-height: 36px;
}
.row:last-child { border-bottom: none; }

.size-label {
  font-size: 10px;
  color: var(--text3);
  min-width: 30px;
  margin-right: 10px;
  font-family: 'Courier New', monospace;
  flex-shrink: 0;
  line-height: 1;
}

.sample-text {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  line-height: 1.25;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .header { padding: 14px 16px 10px; }

  .tab-bar { display: flex; }

  .grid {
    grid-template-columns: minmax(0, 1fr);
  }

  .col {
    border-right: none;
    border-bottom: 0.5px solid var(--border);
    display: none;
  }
  .col:last-child { border-bottom: none; }
  .col.active { display: flex; }

  .col-head {
    position: static;
  }

  .row { padding: 0 14px; }
  .size-label { min-width: 26px; margin-right: 8px; }

  .controls { flex-direction: column; gap: 8px; }
  .ctrl-group { width: 100%; }
  .sample-input { width: 100%; }
}

/* ── Force dark mode class (manual toggle) ── */
body.dark {
  --bg:        #1c1c1e;
  --bg2:       #2c2c2e;
  --bg3:       #3a3a3c;
  --text:      #f5f5f0;
  --text2:     #aeaaa4;
  --text3:     #6e6a64;
  --border:    rgba(255,255,255,0.10);
  --border2:   rgba(255,255,255,0.18);
  --accent:    #5b8fd4;
  --accent-bg: #1a2840;
  --accent-tx: #8ab4e8;
}
body.light {
  --bg:        #ffffff;
  --bg2:       #f5f5f4;
  --bg3:       #eeede9;
  --text:      #1a1917;
  --text2:     #57534e;
  --text3:     #a8a29e;
  --border:    rgba(0,0,0,0.10);
  --border2:   rgba(0,0,0,0.18);
  --accent:    #003781;
  --accent-bg: #e8eef7;
  --accent-tx: #003781;
}
</style>
</head>
<body>

<header class="header" id="mainHeader">
  <div class="header-top">
    <span class="header-title">Font size visualisation</span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode" title="Toggle dark mode">☀︎</button>
  </div>
  <div class="controls">
    <div class="ctrl-group" style="flex:1;min-width:200px">
      <label for="sampleInput">Sample text</label>
      <input class="sample-input" id="sampleInput" type="text" value="The quick brown fox jumps over the lazy dog" maxlength="100">
    </div>
    <div class="ctrl-group">
      <label>Weight</label>
      <div class="weight-group">
        <button class="weight-btn on" data-w="400">Regular</button>
        <button class="weight-btn" data-w="700">Bold</button>
      </div>
    </div>
  </div>
</header>

<nav class="tab-bar" id="tabBar" role="tablist">
  <button class="on" data-col="0" role="tab">System</button>
  <button data-col="1" role="tab">Google</button>
  <button data-col="2" role="tab">Allianz Neo</button>
</nav>

<main class="grid" id="grid">

  <!-- Column 1: System fonts -->
  <section class="col active" id="col0">
    <div class="col-head">
      <div class="col-head-top">
        <span class="col-label">System font</span>
      </div>
      <select class="col-select" id="sysSelect">
        <optgroup label="Sans-serif">
          <option value="Arial,Helvetica,sans-serif" selected>Arial</option>
          <option value="Helvetica,Arial,sans-serif">Helvetica</option>
          <option value="Verdana,sans-serif">Verdana</option>
          <option value="'Trebuchet MS',sans-serif">Trebuchet MS</option>
          <option value="Tahoma,sans-serif">Tahoma</option>
          <option value="Optima,Segoe,sans-serif">Optima / Segoe</option>
          <option value="'Century Gothic',Futura,sans-serif">Century Gothic</option>
          <option value="-apple-system,BlinkMacSystemFont,sans-serif">System UI</option>
        </optgroup>
        <optgroup label="Serif">
          <option value="Georgia,serif">Georgia</option>
          <option value="'Times New Roman',serif">Times New Roman</option>
          <option value="Garamond,serif">Garamond</option>
          <option value="Palatino,'Palatino Linotype',serif">Palatino</option>
        </optgroup>
        <optgroup label="Monospace">
          <option value="'Courier New',monospace">Courier New</option>
        </optgroup>
      </select>
    </div>
    <div class="rows" id="rows0"></div>
  </section>

  <!-- Column 2: Google Fonts -->
  <section class="col" id="col1">
    <div class="col-head">
      <div class="col-head-top">
        <span class="col-label">Google Font</span>
      </div>
      <select class="col-select" id="gooSelect">
        <optgroup label="Sans-serif">
          <option value="'Open Sans',sans-serif" selected>Open Sans</option>
          <option value="'Roboto',sans-serif">Roboto</option>
          <option value="'Noto Sans',sans-serif">Noto Sans</option>
          <option value="'Lato',sans-serif">Lato</option>
          <option value="'Source Sans 3',sans-serif">Source Sans 3</option>
          <option value="'DM Sans',sans-serif">DM Sans</option>
          <option value="'Outfit',sans-serif">Outfit</option>
          <option value="'Raleway',sans-serif">Raleway</option>
          <option value="'Nunito',sans-serif">Nunito</option>
          <option value="'Josefin Sans',sans-serif">Josefin Sans</option>
        </optgroup>
        <optgroup label="Serif">
          <option value="'Playfair Display',serif">Playfair Display</option>
          <option value="'Merriweather',serif">Merriweather</option>
          <option value="'Libre Baskerville',serif">Libre Baskerville</option>
          <option value="'Crimson Text',serif">Crimson Text</option>
          <option value="'Spectral',serif">Spectral</option>
        </optgroup>
      </select>
    </div>
    <div class="rows" id="rows1"></div>
  </section>

  <!-- Column 3: Allianz Neo -->
  <section class="col" id="col2">
    <div class="col-head">
      <div class="col-head-top">
        <span class="col-label">Corporate font</span>
        <span class="badge">Allianz Neo W04</span>
      </div>
      <select class="col-select" id="azSelect">
        <optgroup label="Regular">
          <option value="AllianzNeo|300|normal">Light</option>
          <option value="AllianzNeo|300|italic">Light Italic</option>
          <option value="AllianzNeo|400|normal" selected>Regular</option>
          <option value="AllianzNeo|400|italic">Italic</option>
          <option value="AllianzNeo|600|normal">SemiBold</option>
          <option value="AllianzNeo|600|italic">SemiBold Italic</option>
          <option value="AllianzNeo|700|normal">Bold</option>
          <option value="AllianzNeo|700|italic">Bold Italic</option>
        </optgroup>
        <optgroup label="Condensed">
          <option value="AllianzNeoCondensed|300|normal">Condensed Light</option>
          <option value="AllianzNeoCondensed|400|normal">Condensed Regular</option>
          <option value="AllianzNeoCondensed|700|normal">Condensed Bold</option>
        </optgroup>
      </select>
    </div>
    <div class="rows" id="rows2"></div>
  </section>

</main>

<script>
const SIZES = [8, 10, 12, 14, 16, 18];
const FALLBACK = "The quick brown fox jumps over the lazy dog";
let currentWeight = 400;
let currentSample = FALLBACK;
let activeCol = 0;
let manualTheme = null;

const sampleInput = document.getElementById('sampleInput');
const sysSelect   = document.getElementById('sysSelect');
const gooSelect   = document.getElementById('gooSelect');
const azSelect    = document.getElementById('azSelect');
const themeBtn    = document.getElementById('themeBtn');
const tabBar      = document.getElementById('tabBar');

function parseAz() {
  const [fam, w, sty] = azSelect.value.split('|');
  return { family: `'${fam}', sans-serif`, weight: parseInt(w), style: sty };
}

function getConfigs() {
  const az = parseAz();
  return [
    { id: 'rows0', family: sysSelect.value, weight: currentWeight, style: 'normal' },
    { id: 'rows1', family: gooSelect.value, weight: currentWeight, style: 'normal' },
    { id: 'rows2', family: az.family,       weight: az.weight,     style: az.style  },
  ];
}

function rowMinHeight(size) {
  // generous touch targets — min 44px on mobile, scaled on desktop
  if (window.innerWidth <= 600) return Math.max(size + 28, 44);
  return Math.max(size + 16, 32);
}

function buildRows(id, family, weight, style) {
  const container = document.getElementById(id);
  container.innerHTML = '';
  SIZES.forEach(size => {
    const row = document.createElement('div');
    row.className = 'row';
    row.style.minHeight = rowMinHeight(size) + 'px';

    const lbl = document.createElement('span');
    lbl.className = 'size-label';
    lbl.textContent = size + 'px';

    const txt = document.createElement('span');
    txt.className = 'sample-text';
    txt.style.cssText = `font-size:${size}px;font-family:${family};font-weight:${weight};font-style:${style}`;
    txt.textContent = currentSample;

    row.appendChild(lbl);
    row.appendChild(txt);
    container.appendChild(row);
  });
}

function buildAll() {
  getConfigs().forEach(c => buildRows(c.id, c.family, c.weight, c.style));
}

function updateSamples() {
  getConfigs().forEach(({ id, family, weight, style }) => {
    document.querySelectorAll(`#${id} .sample-text`).forEach(el => {
      el.style.fontFamily  = family;
      el.style.fontWeight  = weight;
      el.style.fontStyle   = style;
      el.textContent       = currentSample;
    });
  });
}

// ── Tab switching (mobile) ──
function switchTab(idx) {
  activeCol = idx;
  document.querySelectorAll('.col').forEach((col, i) => {
    col.classList.toggle('active', i === idx);
  });
  tabBar.querySelectorAll('button').forEach((btn, i) => {
    btn.classList.toggle('on', i === idx);
  });
}

tabBar.querySelectorAll('button').forEach((btn, i) => {
  btn.addEventListener('click', () => switchTab(i));
});

// ── Weight toggle ──
document.querySelectorAll('.weight-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.weight-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    currentWeight = parseInt(btn.dataset.w);
    updateSamples();
  });
});

// ── Font selects ──
sysSelect.addEventListener('change', updateSamples);
gooSelect.addEventListener('change', updateSamples);
azSelect.addEventListener('change',  updateSamples);

// ── Sample text ──
sampleInput.addEventListener('input', () => {
  currentSample = sampleInput.value || FALLBACK;
  updateSamples();
});

// ── Theme toggle ──
function isDarkSystem() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function applyTheme() {
  const dark = manualTheme !== null ? manualTheme : isDarkSystem();
  document.body.classList.toggle('dark', dark);
  document.body.classList.toggle('light', !dark);
  themeBtn.textContent = dark ? '☀︎' : '☾';
  themeBtn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
}

themeBtn.addEventListener('click', () => {
  const dark = manualTheme !== null ? manualTheme : isDarkSystem();
  manualTheme = !dark;
  applyTheme();
});

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (manualTheme === null) applyTheme();
});

// ── Recalc row heights on resize ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    buildAll();
    // On desktop, show all cols; on mobile, show only active
    if (window.innerWidth > 600) {
      document.querySelectorAll('.col').forEach(col => col.classList.add('active'));
    } else {
      switchTab(activeCol);
    }
  }, 120);
});

// ── Init ──
applyTheme();
buildAll();
</script>
</body>
</html>
