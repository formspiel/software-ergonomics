<!DOCTYPE html><html>
	<head>
		<title>test page</title>

		<style type="text/css" media="screen">
			body {
				font-family: Arial, sans-serif;
				font-size: 100%;
			}
		  .box {
		  	background-color: silver;
		  	border: 1px solid black;
		  	margin: 30px;
		  }
			.unit-1 {
				height: 10px;
				width: 10px;
			}
			.unit-2 {
				height: 15px;

			}
			.unit-3 {
				height: 20px;
				width: 20px;
			}
			.unit-4 {
				height: 44px;
				width: 44px;
			}
		</style>
	</head>
	<body>
		<h1>Button Styles</h1>
		<h2>10 CSS pixels</h2>

		<div class="box unit-2"></div>
		<h2>20 CSS pixels</h2>
		<div class="box unit-3"></div>

		<div class="box unit-4"></div>

</html>
