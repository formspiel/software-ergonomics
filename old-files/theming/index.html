<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#c1f07c" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#9874d3" media="(prefers-color-scheme: dark)">
    <title>Too late for the Meeting Joke generator</title>
    <style>
        :root {
        	color-scheme: light dark;
            --background-light: #f9f9f9;
            --background-dark: #333;
            --text-light: #333;
            --text-dark: #f9f9f9;
            --accent-color: #0E98CC;
        }
			
        a {
            padding: .12rem;
            outline-color: transparent; /* TODO: to be tested in Windwows high contrast mode*/
            transition: outline-color 0.4s ease, outline-width 0.4s ease;
		}
		:focus {
			outline: 3px solid var(--accent-color);
			outline-offset: 2px;
			border-radius: 5px;
			background-color: #f6f6f6;
		}
			
        @keyframes fadeIn {
            from {
                    opacity: 0;
            }
            to {
                    opacity: 1;
            }
        }

        body {
            background-color: var(--background-light);
            color: var(--text-light);
            font-family: system-ui;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark-mode {
            background-color: var(--background-dark);
            color: var(--text-dark);
        }
			fieldset {
				border: 1px solid light-dark(var(--text-light), var(--text-dark));
				/* TODO: Doesn't work with current implementation of dark mode toggle */
				/* https://dev.to/web_dev-usman/building-a-smooth-darklight-mode-switch-with-modern-css-features-3jlc */
				margin-bottom: 3rem;
			}

        blockquote {
            border-left: 5px solid var(--accent-color);
            margin: 20px 0;
            padding-left: 15px;
            font-style: italic;
        }

        .label {
            font-weight: bold;
            color: var(--accent-color);
        }

        .id-label {
            font-size: 0.9em;
            color: var(--text-light);
        }

        .dark-mode .id-label {
            color: var(--text-light);
        }

        .loading {
            font-style: italic;
            color: var(--accent-color);
        }
			
			#joke-punchline {
				opacity: 0;
				animation: fadeIn 1s ease-in-out 0.5s forwards;
				/* TODO: Doesn't work if new joke is requested */
			}
    </style>
</head>
<body>
  <button title="Toggle Dark Mode" onclick="toggleDarkMode()">🌓︎</button>
  <h1>Too late for the Meeting Joke generator</h1>
    <fieldset>
      <legend>Choose</legend>
        <label for="joke-category" class="label">Joke category:</label>
        <select id="joke-category">
            <option value="general">General</option>
            <option value="knock-knock">Knock-Knock</option>
            <option value="programming" selected>Programming</option>
            <option value="dad">Dad</option>
        </select>
        <button onclick="fetchJoke()">Get New Joke</button> or
        <button onclick="fetchRandomJoke()">Get Random Joke</button>
    </fieldset>
    <div>
        <span class="label">Type:</span> <span id="joke-type">Loading...</span>
    </div>
    <blockquote id="joke-blockquote" cite="">
        <span class="setup" id="joke-setup">Loading...</span>
        <br>
        <span class="punchline" id="joke-punchline">Loading...</span>
    </blockquote>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        async function fetchJoke() {
						/* Official Joke API by https://github.com/15Dkatz/official_joke_api */
            const category = document.getElementById('joke-category').value;
            const apiUrl = `https://official-joke-api.appspot.com/jokes/${category}/random`;

            setLoadingState();

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const joke = data[0];

                updateJokeContent(joke);
            } catch (error) {
                handleError();
            }
        }

        async function fetchRandomJoke() {
            const apiUrl = 'https://official-joke-api.appspot.com/jokes/random';

            setLoadingState();

            try {
                const response = await fetch(apiUrl);
                const joke = await response.json();

                updateJokeContent(joke);
            } catch (error) {
                handleError();
            }
        }

        function setLoadingState() {
            document.getElementById('joke-type').textContent = 'Loading...';
            document.getElementById('joke-setup').textContent = 'Loading...';
            document.getElementById('joke-punchline').textContent = 'Loading...';
            document.getElementById('joke-blockquote').setAttribute('cite', '');
        }

        function updateJokeContent(joke) {
            document.getElementById('joke-type').textContent = joke.type;
            document.getElementById('joke-setup').textContent = joke.setup;
            document.getElementById('joke-punchline').textContent = joke.punchline;
            document.getElementById('joke-blockquote').setAttribute('cite', `https://official-joke-api.appspot.com/jokes/${joke.id}`);
        }

        function handleError() {
            console.error('Error fetching joke');
            document.getElementById('joke-setup').textContent = 'Failed to load joke.';
            document.getElementById('joke-punchline').textContent = '';
            document.getElementById('joke-blockquote').setAttribute('cite', '');
        }

        // Fetch initial joke on page load
        fetchJoke();
    </script>
</body>
</html>
