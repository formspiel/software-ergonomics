  <rect x="100" y="45" width="30" height="65" fill="url(#hatch)" stroke="currentColor" stroke-width="1.5" />
  <rect x="140" y="20" width="30" height="90" fill="currentColor" stroke="currentColor" stroke-width="1.5" />
  <line x1="10" y1="111" x2="190" y2="111" stroke="currentColor" stroke-width="1.5" />
